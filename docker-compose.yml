version: '3.8'
services:
  server:
    build:
      context: .
      dockerfile: packages/server/Dockerfile
    ports:
      - '3000:3000'
      - '3001:3001'
    volumes:
      - uruc-data:/data
    environment:
      - PORT=3000
      - WS_PORT=3001
      - DB_PATH=/data/uruc.db
      - PUBLIC_DIR=/app/public
      - CITY_CONFIG_PATH=/app/packages/server/uruc.city.json
      - CITY_LOCK_PATH=/app/packages/server/uruc.city.lock.json
      - PLUGIN_STORE_DIR=/app/packages/server/.uruc/plugins
      - JWT_SECRET=${JWT_SECRET:-uruc-dev-secret}
      - ALLOW_REGISTER=${ALLOW_REGISTER:-false}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@localhost}
      - BASE_URL=${BASE_URL:-http://localhost:3000}
      - SITE_PASSWORD=${SITE_PASSWORD:-}

volumes:
  uruc-data:
