name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run docs:check
      - run: npm run test --workspace=packages/server
      - run: npm run build --workspace=packages/server
      - run: npm run build --workspace=packages/human-web
      - run: npm run uruc:smoke
      - run: npm run i18n:check --workspace=packages/human-web
