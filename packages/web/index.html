<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (() => {
        const key = 'uruc_web_theme';
        const legacyKey = 'uruc-human-web-design-theme';
        const storedTheme = window.localStorage.getItem(key) ?? window.localStorage.getItem(legacyKey);
        const root = document.documentElement;
        const isDark = storedTheme === 'dark';
        root.dataset.theme = isDark ? 'dark' : 'light';
        root.classList.toggle('dark', isDark);
      })();
    </script>
    <title>Uruc Workspace</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
